services:
  postgres:
    image: postgres:16-alpine
    container_name: stockrecord-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stockrecord
    ports:
      - "5432:5432"
    volumes:
      - stockrecord_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stockrecord"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  stockrecord_pgdata:
